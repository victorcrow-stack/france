<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EUROTRIP 2026 🌍</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#FAFAF8;color:#1a1a1a;-webkit-font-smoothing:antialiased}

/* HERO */
.hero{background:linear-gradient(135deg,#1B3A5C 0%,#2E5A88 30%,#4A8BC2 60%,#7BB8E0 100%);color:#fff;padding:56px 24px 44px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'✈️ 🗼 🏛️ ⛪ 🏰 🌉 🎭 🍷';position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:20px;letter-spacing:12px;opacity:.15;white-space:nowrap}
.hero::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:40px;background:linear-gradient(to bottom,transparent,#FAFAF8)}
.hero-badge{display:inline-block;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:30px;padding:6px 20px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.9);margin-bottom:18px}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(40px,9vw,64px);font-weight:800;margin-bottom:4px;text-shadow:0 2px 20px rgba(0,0,0,.15)}
.hero h1 span{color:#FFD97D}
.hero-sub{font-size:14px;color:rgba(255,255,255,.75);margin-bottom:28px;font-weight:300}
.hero-stats{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:8px}
.hs{background:rgba(255,255,255,.12);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px 18px;text-align:center;min-width:72px}
.hs .v{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
.hs .l{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-top:2px}

/* SECTION */
.section{max-width:720px;margin:0 auto;padding:0 16px}
.section-title{font-family:'Playfair Display',serif;font-size:22px;text-align:center;margin:32px 0 20px;color:#1B3A5C}
.section-title span{color:#C0392B}

/* CITY CARDS */
.city-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.cc{background:#fff;border-radius:16px;padding:20px 16px;cursor:pointer;transition:all .25s;border:1px solid #EDE9E3;text-align:center;position:relative;overflow:hidden}
.cc:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.cc-img{font-size:42px;margin-bottom:8px;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.cc-flag{position:absolute;top:10px;right:10px;font-size:10px;background:#F0EDE8;padding:3px 8px;border-radius:12px;color:#777;font-weight:500}
.cc-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#1B3A5C;margin-bottom:2px}
.cc-dates{font-size:11px;color:#888;margin-bottom:6px}
.cc-tag{font-size:10px;background:#EBF5FB;color:#2E86C1;padding:3px 10px;border-radius:20px;display:inline-block;font-weight:500}
.cc-accent{position:absolute;bottom:0;left:0;right:0;height:3px}

/* TIPS */
.tips{background:#fff;border-radius:16px;border:1px solid #EDE9E3;padding:20px 24px;margin:0 auto 32px;max-width:720px}
.tips h3{font-family:'Playfair Display',serif;font-size:16px;color:#1B3A5C;margin-bottom:12px}
.tips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.tip{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#555;line-height:1.6;padding:6px 0}
.tip-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.tip b{color:#1a1a1a}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #EDE9E3;overflow-x:auto;scrollbar-width:none;box-shadow:0 1px 8px rgba(0,0,0,.04)}
.nav::-webkit-scrollbar{display:none}
.nav-inner{display:flex;min-width:max-content;max-width:720px;margin:0 auto}
.nb{padding:10px 14px;border:none;background:transparent;color:#888;font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.2s;font-weight:500}
.nb:hover{color:#1B3A5C}
.nb.active{color:#1B3A5C;border-bottom-color:#2E86C1;font-weight:600}
.nb .nf{font-size:14px;margin-right:4px}

/* CONTENT */
.content{max-width:720px;margin:0 auto;padding:0 16px 60px}

/* CITY HEADER */
.ch{background:#fff;border-radius:16px;border:1px solid #EDE9E3;padding:24px;margin:20px 0 16px;display:flex;align-items:center;gap:16px}
.ch-icon{font-size:40px}
.ch-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#1B3A5C}
.ch-info{font-size:12px;color:#888;margin-top:2px}

/* DAY TABS */
.dt{display:flex;gap:0;margin-bottom:20px;background:#fff;border-radius:12px;overflow-x:auto;border:1px solid #EDE9E3;scrollbar-width:none}
.dt::-webkit-scrollbar{display:none}
.dtb{flex:1;min-width:90px;padding:12px 10px;border:none;background:transparent;color:#888;font-family:inherit;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s}
.dtb.active{color:#1B3A5C;border-bottom-color:#2E86C1;background:#EBF5FB;font-weight:600}

/* DAY HEADER */
.dh{background:linear-gradient(135deg,#EBF5FB,#F8F4EE);border-radius:14px;padding:18px 20px;margin-bottom:18px;border:1px solid #E0ECF5}
.dh-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#1B3A5C}
.dh-sub{font-size:11px;color:#888;margin-top:3px}

/* TIMELINE */
.tl{position:relative;padding-left:4px}
.stop{display:flex;gap:12px;margin-bottom:6px;padding:8px 0}
.s-time{min-width:44px;font-size:11px;font-weight:600;color:#888;padding-top:3px;font-family:'Courier New',monospace}
.s-dot-w{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:4px}
.s-dot{width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #ddd;flex-shrink:0}
.s-line{width:1px;flex:1;background:#E8E4DE;margin-top:4px}
.ds{background:#2E86C1}.df{background:#27AE60}.dh2{background:#F39C12}.dtr{background:#E74C3C}.dge{background:#8E44AD}
.s-card{flex:1;background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #EDE9E3;transition:box-shadow .15s}
.s-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.04)}
.s-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:3px}
.s-desc{font-size:12px;color:#666;line-height:1.65}
.s-walk{font-size:10px;color:#2E86C1;margin-top:4px;display:flex;align-items:center;gap:4px}
.s-dur{font-size:10px;color:#aaa;margin-top:2px}

/* FOOD */
.fbtn{margin-top:6px;border:none;background:#E8F8F5;color:#1E8449;font-size:10px;padding:4px 12px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:500;transition:.2s}
.fbtn:hover{background:#D5F5E3}
.flist{margin-top:8px;display:none;padding:10px 12px;background:#FAFFF8;border-radius:10px;border:1px solid #D5F5E3}
.flist.open{display:block}
.fi{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #EEF7EC}
.fi:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.fn{font-size:12px;font-weight:600;color:#1a1a1a}
.fd{font-size:11px;color:#666;margin-top:1px}
.fp{font-size:10px;color:#1E8449;font-weight:600;margin-top:2px}

/* CULTURE */
.cult-btn{width:100%;margin-top:20px;padding:14px 18px;background:#fff;border:1px solid #EDE9E3;border-radius:12px;color:#1B3A5C;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:.2s}
.cult-btn:hover{background:#F8F6F2}
.cult-body{display:none;padding:16px 18px;background:#FFFEF8;border-radius:0 0 12px 12px;border:1px solid #EDE9E3;border-top:none;font-size:12px;color:#555;line-height:1.85}
.cult-body.open{display:block}

/* MUST SEE */
.ms{margin-top:18px;background:#fff;border-radius:12px;border:1px solid #EDE9E3;padding:14px 16px}
.ms h3{font-size:12px;color:#1B3A5C;letter-spacing:.5px;margin-bottom:10px;font-weight:600}
.ms-chips{display:flex;flex-wrap:wrap;gap:6px}
.msc{font-size:10px;padding:4px 10px;background:#EBF5FB;border:1px solid #D6EAF8;border-radius:8px;color:#2E86C1;font-weight:500}

/* BACK BTN */
.back{display:inline-flex;align-items:center;gap:6px;margin:20px 0 0;padding:8px 16px;background:#fff;border:1px solid #EDE9E3;border-radius:10px;cursor:pointer;font-family:inherit;font-size:12px;color:#1B3A5C;font-weight:500;transition:.2s}
.back:hover{background:#EBF5FB}
.map-btn{display:block;width:100%;margin-bottom:18px;padding:12px 18px;background:linear-gradient(135deg,#1a73e8,#4285f4);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;transition:.2s;box-shadow:0 2px 8px rgba(26,115,232,.25)}
.map-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,115,232,.35)}

/* FOOTER */
.footer{text-align:center;padding:32px 16px;font-size:11px;color:#bbb;border-top:1px solid #EDE9E3;margin-top:40px}

@media(max-width:500px){.hero h1{font-size:36px}.city-grid{grid-template-columns:1fr 1fr}.ch{flex-direction:column;text-align:center}.tips-grid{grid-template-columns:1fr}.hero-stats{gap:10px}.hs{padding:8px 12px;min-width:60px}.hs .v{font-size:20px}}
</style>
</head>

let cur=0,cday=0;
const $=id=>document.getElementById(id);

function toggleF(id){const e=document.getElementById('f_'+id);if(e)e.classList.toggle('open')}
function toggleC(){const e=document.getElementById('cb');if(e)e.classList.toggle('open')}

function go(c,d){cur=c;cday=d||0;render();window.scrollTo(0,0)}

function render(){
if(cur===0){renderHome();return}
const c=C[cur],d=c.days[cday],ic=ICONS[c.id]||c.flag,co=COLORS[c.id]||'#2E86C1';
let h=`<div class="nav"><div class="nav-inner">
<button class="nb" onclick="go(0)"><span class="nf">🏠</span>Inicio</button>
${C.slice(1).map((x,i)=>`<button class="nb${cur===i+1?' active':''}" onclick="go(${i+1})">${x.flag} ${x.name}</button>`).join('')}
</div></div>
<div class="content">
<button class="back" onclick="go(0)">← Todas las ciudades</button>
<div class="ch"><div class="ch-icon">${ic}</div><div><div class="ch-name">${c.flag} ${c.name}</div><div class="ch-info">${c.dates} · ${c.accom||''}</div></div></div>
<div class="dt">${c.days.map((dd,i)=>`<button class="dtb${i===cday?' active':''}" onclick="go(${cur},${i})">${dd.date.split('·')[0]}<br><span style="font-size:9px;opacity:.6">${dd.title.substring(0,22)}</span></button>`).join('')}</div>
<div class="dh"><div class="dh-title">${d.title}</div><div class="dh-sub">${d.date}</div></div>
${(()=>{const rk=c.id+'_'+cday;return ROUTES[rk]?'<a class="map-btn" href="'+ROUTES[rk]+'" target="_blank" rel="noopener">🗺️ Abrir ruta del día en Google Maps</a>':'';})()}
<div class="tl">`;
d.stops.forEach((s,si)=>{
const[time,type,icon,name,dur,desc,wf,food]=s;
const isF=Array.isArray(wf);const walk=isF?'':wf;const fa=isF?wf:(Array.isArray(food)?food:null);
const dc=type==='si'?'ds':type==='fo'?'df':type==='ht'?'dh2':type==='tr'?'dtr':'dge';
const fid=cur+'_'+cday+'_'+si;
h+=`<div class="stop"><div class="s-time">${time}</div><div class="s-dot-w"><div class="s-dot ${dc}"></div><div class="s-line"></div></div><div class="s-card">
<div class="s-name">${icon} ${name}</div>
${desc?`<div class="s-desc">${desc}</div>`:''}
${dur?`<div class="s-dur">⏱ ${dur}</div>`:''}
${walk?`<div class="s-walk">🚶 ${walk}</div>`:''}
${fa?`<button class="fbtn" onclick="toggleF('${fid}')">🍴 ${fa.length} recomendados</button><div class="flist" id="f_${fid}">${fa.map(f=>`<div class="fi"><div class="fn">${f[0]}</div><div class="fd">${f[1]}</div><div class="fp">${f[2]} ${f[3]||''}</div></div>`).join('')}</div>`:''}
</div></div>`;
});
h+=`</div>`;
if(d.culture){h+=`<button class="cult-btn" onclick="toggleC()"><span>📖 Contexto histórico y cultural</span><span>▼</span></button><div class="cult-body" id="cb">${d.culture}</div>`}
if(d.must&&d.must.length){h+=`<div class="ms"><h3>✅ Imperdibles del día (${d.must.length})</h3><div class="ms-chips">${d.must.map(m=>`<span class="msc">✓ ${m}</span>`).join('')}</div></div>`}
h+=`</div>`;
app.innerHTML=h;
}
